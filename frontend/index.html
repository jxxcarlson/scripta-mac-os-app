<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scripta</title>

    <!-- Vendored KaTeX (offline) -->
    <link rel="stylesheet" href="vendor/katex/katex.min.css" />
    <script src="vendor/katex/katex.min.js"></script>
    <script src="vendor/katex/mhchem.min.js"></script>

    <!-- Vendored CodeMirror custom element -->
    <script src="vendor/codemirror-element.js"></script>

    <style>
      html, body { margin: 0; height: 100%; }
      #app { height: 100vh; }

      /* CodeMirror theme palette. The vendored editor's theme references these
         --cm-* variables but does not define them (v4 injected them at runtime).
         Without these, selection / sync-highlight / search-match backgrounds are
         transparent — i.e. selection looks broken. Light-theme values: */
      :root {
        --cm-fg: #1a1a1a;
        --cm-bg: #ffffff;
        --cm-selection-bg: #b3d4fc;
        --cm-selection-match-bg: #d7ecff;
        --cm-sync-highlight-bg: #fff2a8;
        --cm-search-match-bg: #ffe08a;
        --cm-search-match-border: #e0a800;
        --cm-search-active-bg: #ffb347;
        --cm-matching-bracket-bg: #c8e6c9;
        --cm-panel-bg: #f2f2f2;
        --cm-panel-fg: #1a1a1a;
        --cm-panel-border: #cccccc;
        --cm-gutter-bg: #f7f7f7;
        --cm-gutter-fg: #999999;
        --cm-active-line-gutter-bg: #ececec;
        --cm-fold-placeholder: #888888;
        --cm-tooltip-bg: #ffffff;
        --cm-syntax-arg: #6a737d;
        --cm-syntax-block-name: #22863a;
        --cm-syntax-block-vert: #999999;
        --cm-syntax-bracket: #6f42c1;
        --cm-syntax-code: #032f62;
        --cm-syntax-deep-orange: #d2691e;
        --cm-syntax-element-name: #005cc5;
        --cm-syntax-heading: #b31d28;
        --cm-syntax-list-marker: #e36209;
        --cm-syntax-math: #6f42c1;
        --cm-syntax-property-key: #005cc5;
      }

      button, .cm-button {
        background: #3b3f45;
        color: #fff;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 2px 8px;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
        background-image: none;
      }
      button:hover, .cm-button:hover { background: #4a4e55; }

      .lr-sync-highlight {
        background-color: #cfe6fb;
        transition: background-color 0.2s ease;
        border-radius: 2px;
      }

      .toc-sync-highlight {
        background-color: #cfe6fb;
        transition: background-color 0.2s ease;
        border-radius: 2px;
      }

      /* CodeMirror search-panel buttons: CM's baseTheme sets color:inherit (dark
         panel text) and a dark gradient background, injected at runtime, so it
         wins the cascade. Force light-on-charcoal to match the app buttons. */
      .cm-button {
        color: #fff !important;
        background: #3b3f45 !important;
        background-image: none !important;
        border: 1px solid #555 !important;
      }
      .cm-button:hover { background: #4a4e55 !important; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="dist/elm.js"></script>
    <script type="module">
      // --- math-text custom element (pasted verbatim from scripta-app-v4) ---
      class MathText extends HTMLElement {
          static get observedAttributes() { return ['content', 'display']; }
          connectedCallback() { this.renderMath(); }
          attributeChangedCallback() { this.renderMath(); }
          renderMath() {
              var content = this.getAttribute('content') || '';
              var displayMode = this.getAttribute('display') === 'true';
              try {
                  this.innerHTML = katex.renderToString(content, {
                      displayMode: displayMode,
                      throwOnError: false,
                      trust: true
                  });
                  // Check if KaTeX rendered an error (throwOnError:false produces .katex-error spans)
                  var errSpan = this.querySelector('.katex-error');
                  if (errSpan) {
                      this.dataset.katexError = 'true';
                      this.dispatchEvent(new CustomEvent('katex-error', {
                          bubbles: true,
                          detail: {
                              id: this.closest('[id]') ? this.closest('[id]').id : '',
                              begin: parseInt(this.closest('[data-begin]')?.getAttribute('data-begin') || '0'),
                              end: parseInt(this.closest('[data-end]')?.getAttribute('data-end') || '0'),
                              content: content,
                              error: errSpan.textContent || 'KaTeX error'
                          }
                      }));
                  } else if (this.dataset.katexError) {
                      delete this.dataset.katexError;
                      this.dispatchEvent(new CustomEvent('katex-ok', {
                          bubbles: true,
                          detail: { id: this.closest('[id]') ? this.closest('[id]').id : '' }
                      }));
                  }
              } catch(e) {
                  this.innerHTML = '<span style="color:red">' + e.message + '</span>';
                  this.dataset.katexError = 'true';
                  this.dispatchEvent(new CustomEvent('katex-error', {
                      bubbles: true,
                      detail: {
                          id: this.closest('[id]') ? this.closest('[id]').id : '',
                          begin: parseInt(this.closest('[data-begin]')?.getAttribute('data-begin') || '0'),
                          end: parseInt(this.closest('[data-end]')?.getAttribute('data-end') || '0'),
                          content: content,
                          error: e.message
                      }
                  }));
              }
          }
          set content(val) { this.setAttribute('content', val); }
          set display(val) { this.setAttribute('display', val); }
      }
      customElements.define('math-text', MathText);

      // --- Tauri global API (withGlobalTauri) ---
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;

      // --- Boot Elm ---
      function lsGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
      let lastVault = null;
      try { lastVault = await invoke('get_last_vault'); } catch (e) { lastVault = null; }
      const flags = {
        lastVault: lastVault,                        // string | null (from Rust)
        readerMode: lsGet('readerMode') === 'true'   // bool
      };
      const app = Elm.Main.init({ node: document.getElementById('app'), flags: flags });

      // Port guards: Elm dead-code-eliminates an unused port, so app.ports[name]
      // can be undefined. Calling .subscribe/.send on it would throw and abort the
      // rest of this boot script (which silently disabled features once before).
      // Guard every access: skip + warn instead of throwing.
      function subscribePort(name, handler) {
        const p = app.ports && app.ports[name];
        if (p && typeof p.subscribe === 'function') p.subscribe(handler);
        else console.warn('Elm port unavailable, skipping subscribe:', name);
      }
      function sendPort(name, payload) {
        const p = app.ports && app.ports[name];
        if (p && typeof p.send === 'function') p.send(payload);
        else console.warn('Elm port unavailable, skipping send:', name);
      }

      // FS request bridge: Elm -> invoke -> Elm
      subscribePort('fsRequest', async (req) => {
        try {
          const result = await invoke(req.op, req.args || {});
          sendPort('fsResponse', { requestId: req.requestId, ok: true, result });
        } catch (e) {
          sendPort('fsResponse', { requestId: req.requestId, ok: false, error: String(e) });
        }
      });

      // Watcher events: Rust -> Elm
      listen('file-changed', (e) => {
        sendPort('fileChanged', e.payload);
      });

      // open-file events forwarded by the single-instance plugin: Rust -> Elm
      listen('open-file', (e) => {
        sendPort('openFile', e.payload);
      });

      // Per-vault open-folder persistence in localStorage
      subscribePort('saveOpenFolders', ({ vault, folders }) => {
        try { localStorage.setItem('openFolders:' + vault, JSON.stringify(folders)); } catch (e) {}
      });
      subscribePort('requestOpenFolders', (vault) => {
        let folders = [];
        try {
          const raw = localStorage.getItem('openFolders:' + vault);
          folders = raw ? JSON.parse(raw) : [];
        } catch (e) { folders = []; }
        sendPort('gotOpenFolders', folders);
      });

      subscribePort('saveReaderMode', (on) => {
        try { localStorage.setItem('readerMode', on ? 'true' : 'false'); } catch (e) {}
      });
      subscribePort('saveLastVault', (vault) => {
        invoke('set_last_vault', { vault: vault }).catch(() => {});
      });

      subscribePort('scrollAndHighlight', (id) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.scrollIntoView({ block: 'center', behavior: 'smooth' });
        document.querySelectorAll('.toc-sync-highlight').forEach((n) => {
          n.classList.remove('toc-sync-highlight');
        });
        el.classList.add('toc-sync-highlight');
      });

      // Ctrl-S / Cmd-S: left-to-right sync. Find the rendered element for the
      // editor's cursor line, scroll it into view, and highlight it.
      function lrParseLine(id) {
        if (!id) return null;
        if (id.indexOf('e-') === 0) {            // expression id "e-N.T" (0-indexed line)
          var n = parseInt(id.substring(2).split('.')[0], 10);
          return isNaN(n) ? null : n;
        }
        var parts = id.split('-');               // block id "N-I" (0-indexed line)
        if (parts.length >= 2) {
          var m = parseInt(parts[0], 10);
          return isNaN(m) ? null : m;
        }
        return null;
      }

      function lrSync() {
        var elc = document.querySelector('codemirror-editor');
        var ed = elc && elc.editor;
        if (!ed) return;
        var pos = ed.state.selection.main.head;
        var line0 = ed.state.doc.lineAt(pos).number - 1; // 0-indexed
        var rendered = document.getElementById('__RENDERED_TEXT__');
        if (!rendered) return;

        var nodes = rendered.querySelectorAll('[id]');
        var exact = null, best = null, bestLine = -1;
        for (var i = 0; i < nodes.length; i++) {
          var ln = lrParseLine(nodes[i].id);
          if (ln === null) continue;
          if (ln === line0) { exact = nodes[i]; break; }
          if (ln <= line0 && ln > bestLine) { best = nodes[i]; bestLine = ln; }
        }
        var target = exact || best;
        if (!target) return;

        target.scrollIntoView({ block: 'center', behavior: 'smooth' });
        document.querySelectorAll('.lr-sync-highlight').forEach(function (n) {
          n.classList.remove('lr-sync-highlight');
        });
        target.classList.add('lr-sync-highlight');
      }

      window.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
          e.preventDefault();
          lrSync();
        }
      }, true);

      // Esc: clear sync highlighting in both the rendered text and the editor.
      // (CodeMirror's own Esc keymap collapses any active text selection.)
      window.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          document.querySelectorAll('.lr-sync-highlight, .toc-sync-highlight').forEach(function (n) {
            n.classList.remove('lr-sync-highlight');
            n.classList.remove('toc-sync-highlight');
          });
          var elc = document.querySelector('codemirror-editor');
          if (elc && elc.editor && elc.clearSyncHighlight) {
            elc.editor.dispatch({ effects: elc.clearSyncHighlight() });
          }
        }
      }, true);
    </script>
  </body>
</html>
