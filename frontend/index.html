<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mac Scripta Viewer</title>

    <!-- Vendored KaTeX (offline) -->
    <link rel="stylesheet" href="vendor/katex/katex.min.css" />
    <script src="vendor/katex/katex.min.js"></script>
    <script src="vendor/katex/mhchem.min.js"></script>

    <!-- Vendored CodeMirror custom element -->
    <script src="vendor/codemirror-element.js"></script>

    <style>
      html, body { margin: 0; height: 100%; }
      #app { height: 100vh; }

      /* CodeMirror theme palette. The vendored editor's theme references these
         --cm-* variables but does not define them (v4 injected them at runtime).
         Without these, selection / sync-highlight / search-match backgrounds are
         transparent — i.e. selection looks broken. Light-theme values: */
      :root {
        --cm-fg: #1a1a1a;
        --cm-bg: #ffffff;
        --cm-selection-bg: #b3d4fc;
        --cm-selection-match-bg: #d7ecff;
        --cm-sync-highlight-bg: #fff2a8;
        --cm-search-match-bg: #ffe08a;
        --cm-search-match-border: #e0a800;
        --cm-search-active-bg: #ffb347;
        --cm-matching-bracket-bg: #c8e6c9;
        --cm-panel-bg: #f2f2f2;
        --cm-panel-fg: #1a1a1a;
        --cm-panel-border: #cccccc;
        --cm-gutter-bg: #f7f7f7;
        --cm-gutter-fg: #999999;
        --cm-active-line-gutter-bg: #ececec;
        --cm-fold-placeholder: #888888;
        --cm-tooltip-bg: #ffffff;
        --cm-syntax-arg: #6a737d;
        --cm-syntax-block-name: #22863a;
        --cm-syntax-block-vert: #999999;
        --cm-syntax-bracket: #6f42c1;
        --cm-syntax-code: #032f62;
        --cm-syntax-deep-orange: #d2691e;
        --cm-syntax-element-name: #005cc5;
        --cm-syntax-heading: #b31d28;
        --cm-syntax-list-marker: #e36209;
        --cm-syntax-math: #6f42c1;
        --cm-syntax-property-key: #005cc5;
      }

      button, .cm-button {
        background: #3b3f45;
        color: #fff;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 2px 8px;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
        background-image: none;
      }
      button:hover, .cm-button:hover { background: #4a4e55; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="dist/elm.js"></script>
    <script>
      // --- math-text custom element (pasted verbatim from scripta-app-v4) ---
      class MathText extends HTMLElement {
          static get observedAttributes() { return ['content', 'display']; }
          connectedCallback() { this.renderMath(); }
          attributeChangedCallback() { this.renderMath(); }
          renderMath() {
              var content = this.getAttribute('content') || '';
              var displayMode = this.getAttribute('display') === 'true';
              try {
                  this.innerHTML = katex.renderToString(content, {
                      displayMode: displayMode,
                      throwOnError: false,
                      trust: true
                  });
                  // Check if KaTeX rendered an error (throwOnError:false produces .katex-error spans)
                  var errSpan = this.querySelector('.katex-error');
                  if (errSpan) {
                      this.dataset.katexError = 'true';
                      this.dispatchEvent(new CustomEvent('katex-error', {
                          bubbles: true,
                          detail: {
                              id: this.closest('[id]') ? this.closest('[id]').id : '',
                              begin: parseInt(this.closest('[data-begin]')?.getAttribute('data-begin') || '0'),
                              end: parseInt(this.closest('[data-end]')?.getAttribute('data-end') || '0'),
                              content: content,
                              error: errSpan.textContent || 'KaTeX error'
                          }
                      }));
                  } else if (this.dataset.katexError) {
                      delete this.dataset.katexError;
                      this.dispatchEvent(new CustomEvent('katex-ok', {
                          bubbles: true,
                          detail: { id: this.closest('[id]') ? this.closest('[id]').id : '' }
                      }));
                  }
              } catch(e) {
                  this.innerHTML = '<span style="color:red">' + e.message + '</span>';
                  this.dataset.katexError = 'true';
                  this.dispatchEvent(new CustomEvent('katex-error', {
                      bubbles: true,
                      detail: {
                          id: this.closest('[id]') ? this.closest('[id]').id : '',
                          begin: parseInt(this.closest('[data-begin]')?.getAttribute('data-begin') || '0'),
                          end: parseInt(this.closest('[data-end]')?.getAttribute('data-end') || '0'),
                          content: content,
                          error: e.message
                      }
                  }));
              }
          }
          set content(val) { this.setAttribute('content', val); }
          set display(val) { this.setAttribute('display', val); }
      }
      customElements.define('math-text', MathText);

      // --- Tauri global API (withGlobalTauri) ---
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;

      // --- Boot Elm ---
      const app = Elm.Main.init({ node: document.getElementById('app') });

      // FS request bridge: Elm -> invoke -> Elm
      app.ports.fsRequest.subscribe(async (req) => {
        try {
          const result = await invoke(req.op, req.args || {});
          app.ports.fsResponse.send({ requestId: req.requestId, ok: true, result });
        } catch (e) {
          app.ports.fsResponse.send({ requestId: req.requestId, ok: false, error: String(e) });
        }
      });

      // Watcher events: Rust -> Elm
      listen('file-changed', (e) => {
        app.ports.fileChanged.send(e.payload);
      });

      // open-file events forwarded by the single-instance plugin: Rust -> Elm
      listen('open-file', (e) => {
        app.ports.openFile.send(e.payload);
      });

      // scrollToElement port
      app.ports.scrollToElement.subscribe((id) => {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });

      // Per-vault open-folder persistence in localStorage
      app.ports.saveOpenFolders.subscribe(({ vault, folders }) => {
        try { localStorage.setItem('openFolders:' + vault, JSON.stringify(folders)); } catch (e) {}
      });
      app.ports.requestOpenFolders.subscribe((vault) => {
        let folders = [];
        try {
          const raw = localStorage.getItem('openFolders:' + vault);
          folders = raw ? JSON.parse(raw) : [];
        } catch (e) { folders = []; }
        app.ports.gotOpenFolders.send(folders);
      });
    </script>
  </body>
</html>
