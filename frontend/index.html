<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kbase</title>

    <!-- Vendored KaTeX (offline) -->
    <link rel="stylesheet" href="vendor/katex/katex.min.css" />
    <script src="vendor/katex/katex.min.js"></script>
    <script src="vendor/katex/mhchem.min.js"></script>

    <!-- Vendored CodeMirror custom element -->
    <script src="vendor/codemirror-element.js"></script>

    <!-- Vendored xterm.js terminal emulator (offline) -->
    <link rel="stylesheet" href="vendor/xterm/xterm.css" />
    <script src="vendor/xterm/xterm.js"></script>
    <script src="vendor/xterm/addon-fit.js"></script>

    <style>
      html, body { margin: 0; height: 100%; background: var(--app-bg); color: var(--app-fg); }
      #app { height: 100vh; }

      /* CodeMirror theme palette. The vendored editor's theme references these
         --cm-* variables but does not define them (v4 injected them at runtime).
         Without these, selection / sync-highlight / search-match backgrounds are
         transparent — i.e. selection looks broken. Light-theme values: */
      :root {
        --app-bg: #eeeeee;
        --app-fg: #1a1a1a;
        --panel-bg: #eeeeee;
        --border: #dddddd;
        --muted: #666666;
        --link: #2563eb;
        --banner-bg: #ffffdd;
        --banner-border: #cccc00;
        --error-bg: #ffeeee;
        --error-fg: #990000;
        --error-border: #cc9999;
        --tree-selected-bg: #cfe6fb;
        --tree-folder-bg: #e8f2fc;
        --chat-prompt-bg: #e0e0e0;

        --cm-fg: #1a1a1a;
        --cm-bg: #eeeeee;
        --cm-selection-bg: #b3d4fc;
        --cm-selection-match-bg: #d7ecff;
        --cm-sync-highlight-bg: #fff2a8;
        --cm-search-match-bg: #ffe08a;
        --cm-search-match-border: #e0a800;
        --cm-search-active-bg: #ffb347;
        --cm-matching-bracket-bg: #c8e6c9;
        --cm-panel-bg: #f2f2f2;
        --cm-panel-fg: #1a1a1a;
        --cm-panel-border: #cccccc;
        --cm-gutter-bg: #f7f7f7;
        --cm-gutter-fg: #999999;
        --cm-active-line-gutter-bg: #ececec;
        --cm-fold-placeholder: #888888;
        --cm-tooltip-bg: #eeeeee;
        --cm-syntax-arg: #6a737d;
        --cm-syntax-block-name: #22863a;
        --cm-syntax-block-vert: #999999;
        --cm-syntax-bracket: #6f42c1;
        --cm-syntax-code: #032f62;
        --cm-syntax-deep-orange: #d2691e;
        --cm-syntax-element-name: #005cc5;
        --cm-syntax-heading: #b31d28;
        --cm-syntax-list-marker: #e36209;
        --cm-syntax-math: #6f42c1;
        --cm-syntax-property-key: #005cc5;
      }

      :root { --terminal-height: 280px; --terminal-split: 50%; --editor-split: 50%; --render-toc-split: 540px; }

      [data-theme="dark"] {
        --app-bg: #1e1e1e;
        --app-fg: #d4d4d4;
        --panel-bg: #252526;
        --border: #3a3a3a;
        --muted: #999999;
        --link: #6aa3ff;
        --banner-bg: #4a4424;
        --banner-border: #7a7030;
        --error-bg: #4a2a2a;
        --error-fg: #ffb3b3;
        --error-border: #7a3a3a;
        --tree-selected-bg: #2a4a6a;
        --tree-folder-bg: #243c54;
        --chat-prompt-bg: #2e2e2e;

        --cm-fg: #d4d4d4;
        --cm-bg: #1e1e1e;
        --cm-selection-bg: #264f78;
        --cm-selection-match-bg: #345f8c;
        --cm-sync-highlight-bg: #4a4424;
        --cm-search-match-bg: #6a5a2a;
        --cm-search-match-border: #b8a04a;
        --cm-search-active-bg: #a07a2a;
        --cm-matching-bracket-bg: #2e5e3a;
        --cm-panel-bg: #252526;
        --cm-panel-fg: #d4d4d4;
        --cm-panel-border: #3a3a3a;
        --cm-gutter-bg: #1e1e1e;
        --cm-gutter-fg: #6a6a6a;
        --cm-active-line-gutter-bg: #2a2a2a;
        --cm-fold-placeholder: #888888;
        --cm-tooltip-bg: #252526;
        --cm-syntax-arg: #9aa3ad;
        --cm-syntax-block-name: #4ec9b0;
        --cm-syntax-block-vert: #777777;
        --cm-syntax-bracket: #c586c0;
        --cm-syntax-code: #ce9178;
        --cm-syntax-deep-orange: #d2691e;
        --cm-syntax-element-name: #569cd6;
        --cm-syntax-heading: #e06c75;
        --cm-syntax-list-marker: #d7ba7d;
        --cm-syntax-math: #c586c0;
        --cm-syntax-property-key: #9cdcfe;
      }

      button, .cm-button {
        background: #4d4e5c;
        color: #fff;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 2px 8px;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
        background-image: none;
        transition: background 0.08s ease, transform 0.05s ease;
      }
      button:hover, .cm-button:hover { background: #3a3c55; }
      @keyframes btn-flash {
        0%   { background: #1f2030; transform: translateY(1px); }
        100% { background: #2b2c40; transform: translateY(0); }
      }
      button:active, .cm-button:active { animation: btn-flash 0.12s ease; }

      .lr-sync-highlight {
        background-color: #cfe6fb;
        transition: background-color 0.2s ease;
        border-radius: 2px;
      }

      .toc-sync-highlight {
        background-color: #cfe6fb;
        transition: background-color 0.2s ease;
        border-radius: 2px;
      }

      [data-theme="dark"] .lr-sync-highlight,
      [data-theme="dark"] .toc-sync-highlight {
        background-color: #2a4a6a;
      }

      /* CodeMirror search-panel buttons: CM's baseTheme sets color:inherit (dark
         panel text) and a dark gradient background, injected at runtime, so it
         wins the cascade. Force light-on-charcoal to match the app buttons. */
      .cm-button {
        color: #fff !important;
        background: #4d4e5c !important;
        background-image: none !important;
        border: 1px solid #555 !important;
      }
      .cm-button:hover { background: #3a3c55 !important; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="dist/elm.js"></script>
    <script type="module">
      // --- math-text custom element (pasted verbatim from scripta-app-v4) ---
      class MathText extends HTMLElement {
          static get observedAttributes() { return ['content', 'display']; }
          connectedCallback() { this.renderMath(); }
          attributeChangedCallback() { this.renderMath(); }
          renderMath() {
              var content = this.getAttribute('content') || '';
              var displayMode = this.getAttribute('display') === 'true';
              try {
                  this.innerHTML = katex.renderToString(content, {
                      displayMode: displayMode,
                      throwOnError: false,
                      trust: true
                  });
                  // Check if KaTeX rendered an error (throwOnError:false produces .katex-error spans)
                  var errSpan = this.querySelector('.katex-error');
                  if (errSpan) {
                      this.dataset.katexError = 'true';
                      this.dispatchEvent(new CustomEvent('katex-error', {
                          bubbles: true,
                          detail: {
                              id: this.closest('[id]') ? this.closest('[id]').id : '',
                              begin: parseInt(this.closest('[data-begin]')?.getAttribute('data-begin') || '0'),
                              end: parseInt(this.closest('[data-end]')?.getAttribute('data-end') || '0'),
                              content: content,
                              error: errSpan.textContent || 'KaTeX error'
                          }
                      }));
                  } else if (this.dataset.katexError) {
                      delete this.dataset.katexError;
                      this.dispatchEvent(new CustomEvent('katex-ok', {
                          bubbles: true,
                          detail: { id: this.closest('[id]') ? this.closest('[id]').id : '' }
                      }));
                  }
              } catch(e) {
                  this.innerHTML = '<span style="color:red">' + e.message + '</span>';
                  this.dataset.katexError = 'true';
                  this.dispatchEvent(new CustomEvent('katex-error', {
                      bubbles: true,
                      detail: {
                          id: this.closest('[id]') ? this.closest('[id]').id : '',
                          begin: parseInt(this.closest('[data-begin]')?.getAttribute('data-begin') || '0'),
                          end: parseInt(this.closest('[data-end]')?.getAttribute('data-end') || '0'),
                          content: content,
                          error: e.message
                      }
                  }));
              }
          }
          set content(val) { this.setAttribute('content', val); }
          set display(val) { this.setAttribute('display', val); }
      }
      customElements.define('math-text', MathText);

      function b64ToBytes(b64) {
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        return bytes;
      }

      class TerminalPane extends HTMLElement {
        connectedCallback() {
          if (this._term) return;
          const id = this.getAttribute('term-id');
          const cwd = this.getAttribute('cwd') || '';
          const term = new Terminal({ convertEol: false, fontFamily: 'ui-monospace, monospace', fontSize: 13, theme: { background: '#333333' } });
          const fit = new FitAddon.FitAddon();
          term.loadAddon(fit);
          term.open(this);
          this._term = term;
          this._fit = fit;
          this._id = id;
          this._cwd = cwd;
          this._opened = false;
          term.onData(function (d) { invoke('terminal_input', { id: id, data: d }).catch(function () {}); });
          this._unlistenOut = listen('terminal-output', function (e) {
            if (e.payload && e.payload.id === id) term.write(b64ToBytes(e.payload.data));
          });
          this._unlistenExit = listen('terminal-exit', function (e) {
            if (e.payload && e.payload.id === id) term.write('\r\n[process exited]\r\n');
          });
          const self = this;
          this._ro = new ResizeObserver(function () { self._openOrResize(); });
          this._ro.observe(this);
          // Open the pty lazily — only once the pane is visible and fitted to its
          // real size. Opening while the tab is hidden (offsetWidth 0) would create
          // the pty at xterm's default 80x24; the post-show resize would then desync
          // the shell's line state and scramble input. See _openOrResize.
          this._openOrResize();
        }
        _openOrResize() {
          if (this.offsetWidth === 0 || this.offsetHeight === 0) return;
          try { this._fit.fit(); } catch (e) { return; }
          if (this._term.cols <= 0 || this._term.rows <= 0) return;
          if (!this._opened) {
            this._opened = true;
            invoke('terminal_open', { id: this._id, cwd: this._cwd, cols: this._term.cols, rows: this._term.rows, initCmd: this.getAttribute('init-cmd') || '' }).catch(function () {});
          } else {
            invoke('terminal_resize', { id: this._id, cols: this._term.cols, rows: this._term.rows }).catch(function () {});
          }
        }
        disconnectedCallback() {
          if (this._ro) this._ro.disconnect();
          if (this._unlistenOut) this._unlistenOut.then(function (f) { f(); });
          if (this._unlistenExit) this._unlistenExit.then(function (f) { f(); });
          if (this._id) invoke('terminal_close', { id: this._id }).catch(function () {});
          if (this._term) this._term.dispose();
        }
      }
      customElements.define('terminal-pane', TerminalPane);

      // --- Tauri global API (withGlobalTauri) ---
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;

      // --- Boot Elm ---
      function lsGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }

      (function () {
        // Clamp to [120, innerHeight-120] so the panel can never grow taller than
        // the viewport (which would bury the resize handle and make it un-shrinkable).
        function clampTerminalHeight(px) {
          const max = Math.max(120, window.innerHeight - 120);
          return Math.max(120, Math.min(max, px));
        }
        function applyTerminalHeight(px, persist) {
          const h = clampTerminalHeight(px);
          document.documentElement.style.setProperty('--terminal-height', h + 'px');
          if (persist) { try { localStorage.setItem('terminalHeight', h); } catch (e) {} }
          return h;
        }
        // On load, clamp + re-persist: repairs any oversized value saved when the
        // window was taller (bigger display / later shrunk), so a restart recovers.
        const saved = parseInt(lsGet('terminalHeight'), 10);
        if (!isNaN(saved)) applyTerminalHeight(saved, true);
        let dragging = false;
        document.addEventListener('pointerdown', function (e) {
          if (e.target && e.target.id === 'terminal-resize-handle') { dragging = true; e.preventDefault(); }
        });
        document.addEventListener('pointermove', function (e) {
          if (!dragging) return;
          applyTerminalHeight(window.innerHeight - e.clientY, false);
        });
        document.addEventListener('pointerup', function () {
          if (!dragging) return;
          dragging = false;
          const cur = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--terminal-height'), 10);
          if (!isNaN(cur)) applyTerminalHeight(cur, true);
        });
        // Re-clamp when the OS window is resized smaller, so the panel follows.
        window.addEventListener('resize', function () {
          const cur = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--terminal-height'), 10);
          if (!isNaN(cur)) applyTerminalHeight(cur, true);
        });
      })();

      // --- Vertical separator between the AI pane (left) and shells/scratch (right). ---
      (function () {
        // Clamp left-pane width to [150, innerWidth-150] so the divider can never be
        // dragged within 150px of either edge (and can't get stuck off-screen).
        function applySplit(px, persist) {
          var h = Math.max(150, Math.min(window.innerWidth - 150, px));
          document.documentElement.style.setProperty('--terminal-split', h + 'px');
          if (persist) { try { localStorage.setItem('terminalSplit', h); } catch (e) {} }
          return h;
        }
        // Read current split from localStorage only (always px) — never parse the CSS
        // var, which may still be the "50%" default.
        var saved = parseInt(lsGet('terminalSplit'), 10);
        if (!isNaN(saved)) applySplit(saved, true);
        var dragging = false;
        document.addEventListener('pointerdown', function (e) {
          if (e.target && e.target.id === 'terminal-split-handle') { dragging = true; e.preventDefault(); }
        });
        document.addEventListener('pointermove', function (e) {
          if (!dragging) return;
          applySplit(e.clientX, false);
        });
        document.addEventListener('pointerup', function (e) {
          if (!dragging) return;
          dragging = false;
          applySplit(e.clientX, true);
        });
        window.addEventListener('resize', function () {
          var s = parseInt(lsGet('terminalSplit'), 10);
          if (!isNaN(s)) applySplit(s, true);
        });
      })();

      // --- Vertical divider between the source editor (left) and rendered preview (right). ---
      (function () {
        var editorLeft = 0;
        function applyEditorSplit(px, persist) {
          var ed = document.querySelector('codemirror-editor');
          var left = ed ? ed.getBoundingClientRect().left : 0;
          // Right-stop only: the editor may grow until the rendered column is
          // squeezed to RENDER_MIN, no further. Leftward it's free down to a
          // small floor. There is no fixed editor max-width (see View.elm).
          var RENDER_MIN = 360;
          var maxW = Math.max(200, window.innerWidth - left - RENDER_MIN);
          var w = Math.max(200, Math.min(maxW, px));
          document.documentElement.style.setProperty('--editor-split', w + 'px');
          if (persist) { try { localStorage.setItem('editorSplit', w); } catch (e) {} }
          return w;
        }
        var saved = parseInt(lsGet('editorSplit'), 10);
        if (!isNaN(saved)) requestAnimationFrame(function () { applyEditorSplit(saved, true); });
        var dragging = false;
        document.addEventListener('pointerdown', function (e) {
          if (e.target && e.target.id === 'editor-split-handle') {
            var ed = document.querySelector('codemirror-editor');
            editorLeft = ed ? ed.getBoundingClientRect().left : 0;
            dragging = true;
            // Capture the pointer to the handle so CodeMirror (to the left) can't
            // steal pointermove and start a text selection when dragging over it.
            if (e.target.setPointerCapture) { try { e.target.setPointerCapture(e.pointerId); } catch (_) {} }
            e.preventDefault();
          }
        });
        document.addEventListener('pointermove', function (e) {
          if (!dragging) return;
          applyEditorSplit(e.clientX - editorLeft, false);
        });
        document.addEventListener('pointerup', function (e) {
          if (!dragging) return;
          dragging = false;
          applyEditorSplit(e.clientX - editorLeft, true);
        });
        window.addEventListener('resize', function () {
          var s = parseInt(lsGet('editorSplit'), 10);
          if (!isNaN(s)) applyEditorSplit(s, true);
        });
      })();

      // --- Vertical divider between the rendered text (left) and the TOC (right). ---
      (function () {
        var renderLeft = 0;
        function applyRenderTocSplit(px, persist) {
          var el = document.getElementById('__RENDERED_TEXT__');
          var left = el ? el.getBoundingClientRect().left : 0;
          var maxW = Math.max(300, window.innerWidth - left - 160);
          var w = Math.max(300, Math.min(maxW, px));
          document.documentElement.style.setProperty('--render-toc-split', w + 'px');
          if (persist) { try { localStorage.setItem('renderTocSplit', w); } catch (e) {} }
          return w;
        }
        var saved = parseInt(lsGet('renderTocSplit'), 10);
        if (!isNaN(saved)) requestAnimationFrame(function () { applyRenderTocSplit(saved, true); });
        var dragging = false;
        document.addEventListener('pointerdown', function (e) {
          if (e.target && e.target.id === 'toc-split-handle') {
            var el = document.getElementById('__RENDERED_TEXT__');
            renderLeft = el ? el.getBoundingClientRect().left : 0;
            dragging = true;
            e.preventDefault();
          }
        });
        document.addEventListener('pointermove', function (e) {
          if (!dragging) return;
          applyRenderTocSplit(e.clientX - renderLeft, false);
        });
        document.addEventListener('pointerup', function (e) {
          if (!dragging) return;
          dragging = false;
          applyRenderTocSplit(e.clientX - renderLeft, true);
        });
        window.addEventListener('resize', function () {
          var s = parseInt(lsGet('renderTocSplit'), 10);
          if (!isNaN(s)) applyRenderTocSplit(s, true);
        });
      })();

      // --- Scratch buffer: debounce-save the scratch editor to localStorage. ---
      (function () {
        var saveTimer = null;
        document.addEventListener('text-change', function (e) {
          if (!(e.target && e.target.closest && e.target.closest('#scratch-editor'))) return;
          var content = (e.detail && e.detail.source != null) ? e.detail.source : '';
          clearTimeout(saveTimer);
          saveTimer = setTimeout(function () {
            try { localStorage.setItem('scratch', content); } catch (err) {}
          }, 400);
        });
      })();

      let lastVault = null;
      try { lastVault = await invoke('get_last_vault'); } catch (e) { lastVault = null; }
      const flags = {
        lastVault: lastVault,                        // string | null (from Rust)
        fullParse: lsGet('fullParse') !== 'false',   // bool (unset → Full)
        isLight: lsGet('isLight') !== 'false',       // bool (unset → Light)
        aiConfig: JSON.parse(lsGet('aiConfig') || 'null'),   // object | null
        terminalVisible: lsGet('terminalVisible') === 'true',   // bool (unset → hidden)
        scratchContent: lsGet('scratch') || ''                  // string (Scratch buffer)
      };
      const app = Elm.Main.init({ node: document.getElementById('app'), flags: flags });

      // App keyboard shortcuts are dispatched by Elm (Browser.Events.onKeyDown).
      // Here we only preventDefault those combos so the webview doesn't act on
      // them: Option-R would insert "®", Ctrl-T is macOS transpose, Cmd-R would
      // reload the webview (reload is now Option-R), and Cmd-[ / Cmd-] are
      // webview history back/forward.
      document.addEventListener('keydown', function (e) {
        var c = e.code;
        var hit =
          (e.metaKey && (c === 'KeyB' || c === 'KeyE' || c === 'KeyN' || c === 'KeyI' || c === 'KeyT' || c === 'KeyR' || e.key === '[' || e.key === ']')) ||
          (e.ctrlKey && (c === 'KeyR' || c === 'KeyT')) ||
          (e.altKey && c === 'KeyR');
        if (hit) e.preventDefault();
      });

      // Port guards: Elm dead-code-eliminates an unused port, so app.ports[name]
      // can be undefined. Calling .subscribe/.send on it would throw and abort the
      // rest of this boot script (which silently disabled features once before).
      // Guard every access: skip + warn instead of throwing.
      function subscribePort(name, handler) {
        const p = app.ports && app.ports[name];
        if (p && typeof p.subscribe === 'function') p.subscribe(handler);
        else console.warn('Elm port unavailable, skipping subscribe:', name);
      }
      function sendPort(name, payload) {
        const p = app.ports && app.ports[name];
        if (p && typeof p.send === 'function') p.send(payload);
        else console.warn('Elm port unavailable, skipping send:', name);
      }

      // FS request bridge: Elm -> invoke -> Elm
      subscribePort('fsRequest', async (req) => {
        try {
          const result = await invoke(req.op, req.args || {});
          sendPort('fsResponse', { requestId: req.requestId, ok: true, result });
        } catch (e) {
          sendPort('fsResponse', { requestId: req.requestId, ok: false, error: String(e) });
        }
      });

      // Watcher events: Rust -> Elm
      listen('file-changed', (e) => {
        sendPort('fileChanged', e.payload);
      });

      // open-file events forwarded by the single-instance plugin: Rust -> Elm
      listen('open-file', (e) => {
        sendPort('openFile', e.payload);
      });

      // Per-vault open-folder persistence in localStorage
      subscribePort('saveOpenFolders', ({ vault, folders }) => {
        try { localStorage.setItem('openFolders:' + vault, JSON.stringify(folders)); } catch (e) {}
      });
      subscribePort('requestOpenFolders', (vault) => {
        let folders = [];
        try {
          const raw = localStorage.getItem('openFolders:' + vault);
          folders = raw ? JSON.parse(raw) : [];
        } catch (e) { folders = []; }
        sendPort('gotOpenFolders', folders);
      });

      subscribePort('saveFullParse', (on) => {
        try { localStorage.setItem('fullParse', on ? 'true' : 'false'); } catch (e) {}
      });
      subscribePort('saveIsLight', (on) => {
        try { localStorage.setItem('isLight', on ? 'true' : 'false'); } catch (e) {}
      });
      subscribePort('saveAiConfig', (cfg) => {
        try { localStorage.setItem('aiConfig', JSON.stringify(cfg)); } catch (e) {}
      });
      subscribePort('saveTerminalVisible', (on) => {
        try { localStorage.setItem('terminalVisible', on ? 'true' : 'false'); } catch (e) {}
      });
      subscribePort('copyToClipboard', (text) => {
        navigator.clipboard.writeText(text).catch(() => {});
      });
      subscribePort('saveLastVault', (vault) => {
        invoke('set_last_vault', { vault: vault }).catch(() => {});
      });

      subscribePort('scrollAndHighlight', (id) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.scrollIntoView({ block: 'center', behavior: 'smooth' });
        document.querySelectorAll('.toc-sync-highlight').forEach((n) => {
          n.classList.remove('toc-sync-highlight');
        });
        el.classList.add('toc-sync-highlight');
      });

      // Ctrl-S / Cmd-S: left-to-right sync. Find the rendered element for the
      // editor's cursor line, scroll it into view, and highlight it.
      function lrParseLine(id) {
        if (!id) return null;
        if (id.indexOf('e-') === 0) {            // expression id "e-N.T" (0-indexed line)
          var n = parseInt(id.substring(2).split('.')[0], 10);
          return isNaN(n) ? null : n;
        }
        var parts = id.split('-');               // block id "N-I" (0-indexed line)
        if (parts.length >= 2) {
          var m = parseInt(parts[0], 10);
          return isNaN(m) ? null : m;
        }
        return null;
      }

      function lrSync() {
        var elc = document.querySelector('codemirror-editor');
        var ed = elc && elc.editor;
        if (!ed) return;
        var pos = ed.state.selection.main.head;
        var line0 = ed.state.doc.lineAt(pos).number - 1; // 0-indexed
        var rendered = document.getElementById('__RENDERED_TEXT__');
        if (!rendered) return;

        var nodes = rendered.querySelectorAll('[id]');
        var exact = null, best = null, bestLine = -1;
        for (var i = 0; i < nodes.length; i++) {
          var ln = lrParseLine(nodes[i].id);
          if (ln === null) continue;
          if (ln === line0) { exact = nodes[i]; break; }
          if (ln <= line0 && ln > bestLine) { best = nodes[i]; bestLine = ln; }
        }
        var target = exact || best;
        if (!target) return;

        target.scrollIntoView({ block: 'center', behavior: 'smooth' });
        document.querySelectorAll('.lr-sync-highlight').forEach(function (n) {
          n.classList.remove('lr-sync-highlight');
        });
        target.classList.add('lr-sync-highlight');
      }

      window.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
          e.preventDefault();
          // Scratch has no rendered panel and auto-saves; don't run document sync from it.
          var ae = document.activeElement;
          if (ae && ae.closest && ae.closest('#scratch-editor')) return;
          lrSync();
        }
      }, true);

      // Esc: clear sync highlighting in both the rendered text and the editor.
      // (CodeMirror's own Esc keymap collapses any active text selection.)
      window.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          document.querySelectorAll('.lr-sync-highlight, .toc-sync-highlight').forEach(function (n) {
            n.classList.remove('lr-sync-highlight');
            n.classList.remove('toc-sync-highlight');
          });
          var elc = document.querySelector('codemirror-editor');
          if (elc && elc.editor && elc.clearSyncHighlight) {
            elc.editor.dispatch({ effects: elc.clearSyncHighlight() });
          }
        }
      }, true);
    </script>
  </body>
</html>
